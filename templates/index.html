<!DOCTYPE html>
<html>
<head>
  <title>Lista de Produtos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="mb-4">Lista de Produtos</h1>

<a href="/create" class="btn btn-primary mb-3">Adicionar Produto</a>

<table class="table table-bordered table-striped">
<tr>
<th>ID</th>
<th>Produto</th>
<th>Preço</th>
<th>Ações</th>
</tr>

{% for product in products %}
<tr>
<td>{{ product[0] }}</td>
<td>{{ product[1] }}</td>
<td>R$ {{ "%.2f"|format(product[2]) }}</td>
<td>
  <a href="/edit/{{ product[0] }}" class="btn btn-warning btn-sm">Editar</a>
  <a href="/delete/{{ product[0] }}" class="btn btn-danger btn-sm">Excluir</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
